# dock_database.yaml
# Nav2 Docking Server — list of known docking stations in the map frame.
#
# pose: [x, y, yaw_radians]
#   x, y    : position of the dock in the map (metres)
#   yaw     : orientation the robot should face when docked (radians)
#
# This project treats the map origin as the rough dock reference: start mapping
# with the robot at the dock, save that map, then use AprilTag detection for the
# precise final docking correction.

docks:
  charging_dock:
    type: 'simple_charging_dock'
    frame: map
    pose: [0.0, 0.0, 0.0]
