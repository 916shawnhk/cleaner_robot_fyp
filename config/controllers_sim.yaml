controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true
    # **actual robot**
    # use_sim_time: false 

    diff_cont:
      type: diff_drive_controller/DiffDriveController

    joint_broad:
      type: joint_state_broadcaster/JointStateBroadcaster

diff_cont:
  ros__parameters:

    publish_rate: 50.0

    base_frame_id: base_link

    left_wheel_names: ['left_wheel_joint']
    right_wheel_names: ['right_wheel_joint']
    wheel_separation: 0.28
    wheel_radius: 0.0335

    # to match nav2_params.yaml ??
    max_velocity_x: 1.25
    min_velocity_x: -1.25
    max_angular_velocity: 3.2
    max_linear_x: 1.25
    min_linear_x: -1.25

