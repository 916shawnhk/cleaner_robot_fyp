joy_node:
  ros__parameters:
    device_id: 0
    deadzone: 0.05
    autorepeat_rate: 20.0

teleop_node:
  ros__parameters:

    # Information for TwistStamped header
    publish_stamped_twist: true
    frame: 'base_link'
    
    # Axis mappings (XBOX CONTROLLER)
    axis_linear:  # Left thumb stick vertical
      x: 1
    scale_linear:
      x: 0.5
    scale_linear_turbo:
      x: 1.0

    axis_angular:  # Left thumb stick horizontal
      yaw: 0
    scale_angular:
      yaw: 0.5
    scale_angular_turbo:
      yaw: 1.0

    # Button Mappings
    enable_button: 4  # Hold LB
    enable_turbo_button: 5  # Hold RB

    require_enable_button: true  # must hold LB/RB to move